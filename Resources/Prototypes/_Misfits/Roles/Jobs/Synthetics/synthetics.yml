# Per-species synthetic robot jobs. #Misfits Change
# Each robot species (Mr. Handy, Protectron, Mr. Gutsy, Assaultron) gets its own job,
# locked to that species via CharacterSpeciesRequirement. The species restrictedJobs
# field ensures only the matching species can see each job in the lobby.
# Access is gated via per-job whitelist (admin: jobwhitelistadd <player> SyntheticMrHandy).

- type: job
  id: SyntheticMrHandy
  name: job-name-synthetic-mr-handy
  description: job-description-synthetic-mr-handy
  playTimeTracker: SyntheticMrHandy
  icon: JobIconBorg
  supervisors: job-supervisors-synthetic
  canBeAntag: false
  setPreference: true
  overrideConsoleVisibility: true
  whitelisted: true # #Misfits Change
  hideWithoutWhitelist: true # #Misfits Change
  spawnLoadout: false
  applyTraits: false
  requirements: # #Misfits Change: lock to species
  - !type:CharacterSpeciesRequirement
    species:
    - RobotMrHandy

